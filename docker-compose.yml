services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - redis

  watcher:
    build: .
    command: python app/watcher.py
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis

  worker:
    build: .
    command: python app/worker.py
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_LOG_LEVEL=error